services:
  app:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.pnpm-store
      - pnpm_store:/root/.local/share/pnpm/store
    environment:
      - PNPM_HOME=/root/.local/share/pnpm
      - PNPM_CONFIG_STORE_DIR=/root/.local/share/pnpm/store
    command: pnpm astro dev --host 0.0.0.0

volumes:
  pnpm_store:
